<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bzazel">
<meta name="theme-color" content="#2c2620">
<link rel="manifest" href="manifest.json">
<title>Bzazel</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4efe6;
  --card: #faf7f2;
  --border: #e2d9cc;
  --text: #2c2620;
  --muted: #8a7f74;
  --fire: #c0392b;
  --fire-bg: #fdf0ee;
  --fire-border: #e8b4ae;
  --soon: #b8660a;
  --soon-bg: #fdf4e7;
  --soon-border: #f0d4a0;
  --upcoming: #5a7a3a;
  --upcoming-bg: #f0f5eb;
  --upcoming-border: #c4d9b0;
  --ongoing: #2e6da4;
  --ongoing-bg: #edf4fc;
  --ongoing-border: #a8c8e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); font-family: 'Instrument Sans', -apple-system, sans-serif; color: var(--text); min-height: 100vh; padding-bottom: 48px; }

.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 16px 0; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.htitle { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.hsub { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }
.pnum { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1; text-align: right; }
.plabel { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; text-align: right; }
.pbar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
.pbar-fill { height: 100%; background: linear-gradient(90deg,#8B7355,#b89a6e); border-radius: 2px; transition: width 0.5s ease; }
.chips { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; border-radius: 20px; padding: 5px 11px; font-size: 11px; font-weight: 500; white-space: nowrap; font-family: inherit; }
.chip.dark { background: var(--text); color: #f4efe6; }
.chip.red { background: var(--fire); color: white; }
.chip.orange { background: var(--soon); color: white; }
.chip.light { background: var(--border); color: var(--text); }

.filters { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; background: var(--card); border-bottom: 1px solid var(--border); }
.filters::-webkit-scrollbar { display: none; }
.fbtn { flex-shrink: 0; border: 1px solid var(--border); background: var(--bg); color: var(--muted); border-radius: 20px; padding: 5px 11px; font-size: 11px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.12s; }
.fbtn.active { background: var(--text); color: #f4efe6; border-color: var(--text); }

.content { padding: 12px 16px 0; }

.fire-zone { background: var(--fire-bg); border: 1px solid var(--fire-border); border-radius: 12px; padding: 13px; margin-bottom: 14px; }
.fz-title { font-size: 11px; font-weight: 600; color: var(--fire); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.fi { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--fire-border); cursor: pointer; }
.fi:last-child { border-bottom: none; padding-bottom: 0; }
.fi-chk { width: 17px; height: 17px; border: 1.5px solid var(--fire-border); border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; background: white; transition: all 0.12s; }
.fi-chk.on { background: var(--fire); border-color: var(--fire); }
.fi-t { font-size: 13px; font-weight: 500; color: var(--fire); line-height: 1.3; margin-bottom: 2px; }
.fi-t.dn { color: #c0a09a; text-decoration: line-through; }
.fi-s { font-size: 11px; color: #b07060; }

.sec { margin-bottom: 4px; }
.sec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 11px 0 7px; cursor: pointer; border-top: 1px solid var(--border); }
.sec-l { display: flex; align-items: center; gap: 8px; }
.sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sec-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.sec-ct { font-size: 11px; color: var(--muted); }
.sec-tog { font-size: 18px; color: var(--muted); font-weight: 300; line-height: 1; }

.tcard { background: var(--card); border-radius: 10px; border-left: 3px solid var(--border); margin-bottom: 5px; overflow: hidden; }
.tcard.fire { border-left-color: var(--fire); }
.tcard.soon { border-left-color: var(--soon); }
.tcard.upcoming { border-left-color: var(--upcoming); }
.tcard.ongoing { border-left-color: var(--ongoing); }
.tcard.done { opacity: 0.55; border-left-color: var(--border); }

.tmain { display: flex; align-items: flex-start; gap: 11px; padding: 11px 11px 9px; cursor: pointer; }
.tchk { width: 17px; height: 17px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; border: 1.5px solid var(--border); background: white; }
.tchk.fire { border-color: var(--fire-border); }
.tchk.soon { border-color: var(--soon-border); }
.tchk.upcoming { border-color: var(--upcoming-border); }
.tchk.ongoing { border-color: var(--ongoing-border); }
.tchk.cfire { background: var(--fire); border-color: var(--fire); }
.tchk.csoon { background: var(--soon); border-color: var(--soon); }
.tchk.cupcoming { background: var(--upcoming); border-color: var(--upcoming); }
.tchk.congoing { background: var(--ongoing); border-color: var(--ongoing); }
.tchk.cnone { background: var(--muted); border-color: var(--muted); }

.tbody { flex: 1; min-width: 0; }
.ttitle { font-size: 13px; font-weight: 500; line-height: 1.35; margin-bottom: 4px; }
.ttitle.dn { color: #b0a89e; text-decoration: line-through; }
.tmeta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tdl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 4px; }
.tdl.fire { color: var(--fire); background: var(--fire-bg); }
.tdl.soon { color: var(--soon); background: var(--soon-bg); }
.tdl.upcoming { color: var(--upcoming); background: var(--upcoming-bg); }
.tdl.ongoing { color: var(--ongoing); background: var(--ongoing-bg); }
.tdl.neutral { color: var(--muted); background: var(--bg); }
.morebtnn { font-size: 10px; color: var(--muted); padding: 2px 7px; border-radius: 4px; background: var(--bg); border: none; font-family: inherit; cursor: pointer; }
.tdetail { display: none; padding: 9px 11px 11px 39px; font-size: 12px; color: var(--muted); line-height: 1.65; border-top: 1px solid var(--border); }
.tdetail.open { display: block; }
.tdetail a { color: var(--ongoing); word-break: break-all; }
.tdetail ul { padding-left: 14px; margin-top: 4px; }
.tdetail li { margin-bottom: 4px; }
.have { color: var(--upcoming); font-weight: 600; }
.need { color: var(--fire); font-weight: 600; }
.note { color: var(--soon); font-weight: 600; }
.ck { width: 10px; height: 8px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* TOAST POPUP */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: #f4efe6; border-radius: 20px;
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  max-width: 88vw; text-align: center; z-index: 999;
  opacity: 0; transition: all 0.3s ease; pointer-events: none;
  box-shadow: 0 4px 20px rgba(44,38,32,0.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* VIBE BAR */
.vibe-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 9px 16px; display: flex; align-items: center; justify-content: space-between;
  gap: 10px; cursor: pointer;
}
.vibe-text { font-size: 12px; color: var(--text); flex: 1; line-height: 1.4; }
.vibe-tap { font-size: 10px; color: var(--muted); flex-shrink: 0; }

/* SYMBOL BAR */
.sym-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 6px;
  overflow-x: auto; scrollbar-width: none;
}
.sym-bar::-webkit-scrollbar { display: none; }
.sym { font-size: 17px; }
.big-countdown {
  background: var(--text); color: #f4efe6; border-radius: 10px;
  padding: 12px 14px; margin: 12px 16px 0; display: flex;
  align-items: center; justify-content: space-between;
}
.bcd-left { }
.bcd-days { font-size: 32px; font-weight: 600; line-height: 1; }
.bcd-label { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.bcd-right { font-size: 22px; }
.bcd-caption { font-size: 11px; opacity: 0.75; margin-top: 6px; line-height: 1.4; }

/* BOOBY */
.booby-logo { width: 32px; height: 32px; cursor: pointer; flex-shrink: 0; }

/* EASTER EGG OVERLAY */
.egg-overlay {
  position: fixed; inset: 0; background: rgba(44,38,32,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; padding: 32px; opacity: 0;
  transition: opacity 0.4s; pointer-events: none;
}
.egg-overlay.show { opacity: 1; pointer-events: all; }
.egg-box {
  background: #f4efe6; border-radius: 16px; padding: 28px 24px;
  max-width: 340px; text-align: center;
}
.egg-icon { font-size: 36px; margin-bottom: 12px; }
.egg-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
.egg-msg { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
.egg-close { background: var(--text); color: #f4efe6; border: none; border-radius: 20px; padding: 8px 20px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; }

/* MILESTONE BANNER */
.milestone {
  position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #f4efe6; border-radius: 12px;
  padding: 12px 20px; font-size: 13px; font-weight: 500;
  z-index: 998; transition: top 0.4s ease; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(44,38,32,0.3); text-align: center;
  max-width: 90vw; white-space: normal;
}
.milestone.show { top: 16px; }

/* NOTIF BUTTON */
.notif-bar {
  background: var(--upcoming-bg); border-bottom: 1px solid var(--upcoming-border);
  padding: 8px 16px; display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.notif-bar-text { font-size: 11px; color: var(--upcoming); flex: 1; }
.notif-btn { background: var(--upcoming); color: white; border: none; border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 500; font-family: inherit; cursor: pointer; flex-shrink: 0; }
.notif-btn.denied { background: var(--muted); cursor: default; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:10px">
      <!-- BOOBY BIRD LOGO -->
      <svg class="booby-logo" id="boobyBtn" viewBox="0 0 32 32" onclick="boobyTap()">
        <!-- body -->
        <ellipse cx="16" cy="17" rx="8" ry="9" fill="#f0ede0" stroke="#c8b89a" stroke-width="1"/>
        <!-- head -->
        <ellipse cx="16" cy="9" rx="5" ry="4.5" fill="#f0ede0" stroke="#c8b89a" stroke-width="1"/>
        <!-- beak -->
        <polygon points="16,8 21,9.5 16,11" fill="#d4a820"/>
        <!-- eye -->
        <circle cx="18" cy="9" r="1.2" fill="#2c2620"/>
        <circle cx="18.4" cy="8.7" r="0.4" fill="white"/>
        <!-- wing detail -->
        <ellipse cx="12" cy="17" rx="4" ry="6" fill="#e0dcd0" stroke="#c8b89a" stroke-width="0.5"/>
        <!-- tail -->
        <ellipse cx="16" cy="25" rx="3" ry="2" fill="#e0dcd0" stroke="#c8b89a" stroke-width="0.5"/>
        <!-- BLUE FEET -->
        <line x1="13" y1="26" x2="11" y2="30" stroke="#2e80c0" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="11" y1="30" x2="9" y2="31" stroke="#2e80c0" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="30" x2="10" y2="32" stroke="#2e80c0" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="30" x2="12" y2="32" stroke="#2e80c0" stroke-width="2" stroke-linecap="round"/>
        <line x1="19" y1="26" x2="21" y2="30" stroke="#2e80c0" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="21" y1="30" x2="23" y2="31" stroke="#2e80c0" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="30" x2="22" y2="32" stroke="#2e80c0" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="30" x2="20" y2="32" stroke="#2e80c0" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="htitle" id="titleEl" onclick="titleTap()">Bzazel</div>
        <div class="hsub">Mar 25 — Sep 2026</div>
      </div>
    </div>
    <div>
      <div class="pnum" id="pnum">0%</div>
      <div class="plabel" id="plbl">0/0</div>
    </div>
  </div>
  <div class="pbar-wrap" id="pbarWrap" onclick="pbarTap()"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>
  <div class="chips" id="chips"></div>
</div>
<div class="filters">
  <button class="fbtn active" onclick="setF('all',this)">All</button>
  <button class="fbtn" onclick="setF('fire',this)">🔴 Now</button>
  <button class="fbtn" onclick="setF('soon',this)">🟠 Soon</button>
  <button class="fbtn" onclick="setF('upcoming',this)">🟢 Upcoming</button>
  <button class="fbtn" onclick="setF('ongoing',this)">🔵 Ongoing</button>
  <button class="fbtn" onclick="setF('work',this)">Work Exit</button>
  <button class="fbtn" onclick="setF('visa',this)">Visa</button>
  <button class="fbtn" onclick="setF('job',this)">Jobs</button>
  <button class="fbtn" onclick="setF('freelance',this)">Freelance</button>
  <button class="fbtn" onclick="setF('school',this)">School</button>
  <button class="fbtn" onclick="setF('life',this)">Life</button>
  <button class="fbtn" onclick="setF('arrival',this)">Arrival</button>
  <button class="fbtn" onclick="setF('done',this)">Done</button>
</div>
<div id="notifBar" class="notif-bar" style="display:none">
  <div class="notif-bar-text">Enable daily reminders so Bzazel can bother you productively</div>
  <button class="notif-btn" id="notifBtn" onclick="requestNotifs()">Enable</button>
</div>
<div class="vibe-bar" onclick="nextVibe()">
  <div class="vibe-text" id="vibeText">loading...</div>
  <div class="vibe-tap">tap</div>
</div>
<div class="sym-bar" id="symBar" onclick="symBarTap()">
  <!-- Swiss flag SVG -->
  <svg width="20" height="20" viewBox="0 0 20 20" style="flex-shrink:0">
    <rect width="20" height="20" rx="3" fill="#FF0000"/>
    <rect x="8.5" y="3" width="3" height="14" fill="white"/>
    <rect x="3" y="8.5" width="14" height="3" fill="white"/>
  </svg>
  <span style="font-size:11px;color:var(--muted);font-weight:600">×</span>
  <!-- Basel flag SVG - white top, red bottom, black crozier -->
  <svg width="20" height="20" viewBox="0 0 20 20" style="flex-shrink:0">
    <rect width="20" height="10" rx="0" fill="white" stroke="#e2d9cc" stroke-width="0.5"/>
    <rect y="10" width="20" height="10" rx="0" fill="#FF0000"/>
    <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#e2d9cc" stroke-width="0.5"/>
    <!-- simplified bishop staff -->
    <line x1="10" y1="4" x2="10" y2="17" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M10 4 Q13 4 13 7 Q13 9 10 9" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </svg>
  <!-- SVG Cow -->
  <svg width="22" height="18" viewBox="0 0 22 18" style="flex-shrink:0">
    <ellipse cx="11" cy="11" rx="7" ry="5" fill="white" stroke="#555" stroke-width="1"/>
    <circle cx="7" cy="8" r="3" fill="white" stroke="#555" stroke-width="1"/>
    <!-- spots -->
    <ellipse cx="12" cy="11" rx="2.5" ry="2" fill="#333"/>
    <ellipse cx="8" cy="13" rx="1.5" ry="1" fill="#555"/>
    <!-- legs -->
    <line x1="7" y1="15" x2="7" y2="18" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="16" x2="10" y2="18" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="16" x2="13" y2="18" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="15" x2="16" y2="18" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    <!-- ears -->
    <ellipse cx="5" cy="6.5" rx="1.5" ry="1" fill="white" stroke="#555" stroke-width="0.8" transform="rotate(-20,5,6.5)"/>
    <ellipse cx="9" cy="5.5" rx="1.5" ry="1" fill="white" stroke="#555" stroke-width="0.8" transform="rotate(15,9,5.5)"/>
    <!-- nose -->
    <ellipse cx="7" cy="10.5" rx="1.8" ry="1.2" fill="#ffcccc" stroke="#999" stroke-width="0.5"/>
    <circle cx="6.5" cy="10.5" r="0.4" fill="#c88"/>
    <circle cx="7.7" cy="10.5" r="0.4" fill="#c88"/>
  </svg>
  <!-- SVG Sheep -->
  <svg width="20" height="16" viewBox="0 0 20 16" style="flex-shrink:0">
    <ellipse cx="10" cy="9" rx="6" ry="4.5" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <!-- fluffy texture via circles -->
    <circle cx="6" cy="8" r="2.5" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
    <circle cx="10" cy="6.5" r="2.5" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
    <circle cx="14" cy="8" r="2.5" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
    <!-- head -->
    <ellipse cx="4" cy="8" rx="2.2" ry="2" fill="#ddd" stroke="#aaa" stroke-width="0.8"/>
    <!-- eye -->
    <circle cx="3.2" cy="7.5" r="0.5" fill="#333"/>
    <!-- legs -->
    <line x1="7" y1="13" x2="7" y2="16" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="13.5" x2="10" y2="16" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="13" x2="13" y2="16" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <span style="font-size:11px;color:var(--muted);margin-left:4px;flex-shrink:0">Basel, here she comes.</span>
</div>
<div class="big-countdown" id="bigCd" onclick="cdTap()">
  <div class="bcd-left">
    <div class="bcd-days" id="bcdDays">—</div>
    <div class="bcd-label">days until Basel</div>
    <div class="bcd-caption" id="bcdCaption">computing your escape...</div>
  </div>
  <div class="bcd-right">
    <!-- Swiss flag small -->
    <svg width="28" height="28" viewBox="0 0 20 20">
      <rect width="20" height="20" rx="3" fill="#FF0000"/>
      <rect x="8.5" y="3" width="3" height="14" fill="white"/>
      <rect x="3" y="8.5" width="14" height="3" fill="white"/>
    </svg>
  </div>
</div>
<div class="content">
  <div id="fzone"></div>
  <div id="secs"></div>
</div>
<div class="toast" id="toast"></div>
<div class="milestone" id="milestone"></div>
<!-- EASTER EGG OVERLAY -->
<div class="egg-overlay" id="eggOverlay" onclick="closeEgg()">
  <div class="egg-box" onclick="event.stopPropagation()">
    <div class="egg-icon" id="eggIcon"></div>
    <div class="egg-title" id="eggTitle"></div>
    <div class="egg-msg" id="eggMsg"></div>
    <button class="egg-close" onclick="closeEgg()">close</button>
  </div>
</div>
<script>
const T0 = new Date(2026,2,25);
function daysTo(ds){const d=new Date(ds);return Math.round((d-T0)/(864e5));}

// ===== MESSAGE DATABASE — loaded from messages.json =====
let VIBES = ["Tap for a message..."];
let CD_CAPTIONS = ["The cows are waiting."];
let DONE_MSGS = ["Done."];
let UNDO_MSGS = ["Unchecked."];

async function loadMessages() {
  try {
    const r = await fetch('messages.json?t=' + Date.now());
    const data = await r.json();
    let pool = [];
    if (data.vibes?.length) pool = pool.concat(data.vibes);
    if (data.roasts?.length) pool = pool.concat(data.roasts);
    if (data.facts_finance?.length) pool = pool.concat(data.facts_finance);
    if (data.facts_swiss?.length) pool = pool.concat(data.facts_swiss);
    if (data.facts_birds?.length) pool = pool.concat(data.facts_birds);
    if (data.facts_people?.length) pool = pool.concat(data.facts_people);
    if (data.facts_random?.length) pool = pool.concat(data.facts_random);
    if (pool.length) VIBES = pool.sort(() => Math.random() - 0.5);
    if (data.done_msgs?.length) DONE_MSGS = data.done_msgs;
    if (data.undo_msgs?.length) UNDO_MSGS = data.undo_msgs;
    if (data.countdown_captions?.length) CD_CAPTIONS = data.countdown_captions;
    vibeIdx = Math.floor(Math.random() * VIBES.length);
    document.getElementById('vibeText').textContent = VIBES[vibeIdx];
    renderBigCountdown();
  } catch(e) {
    console.log('messages.json not found, using fallback', e);
    document.getElementById('vibeText').textContent = VIBES[0];
  }
}

function ck(){return'<svg class="ck" viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg>';}

function toggleTask(id,ev){
  ev.stopPropagation();
  const wasDone=!!CK[id];
  CK[id]=!CK[id];
  save();
  if(CK[id]){
    const msg=DONE_MSGS[Math.floor(Math.random()*DONE_MSGS.length)];
    showToast(msg);

}

  render();
}
function match(t){
  if(FILT==='all')return true;
  if(FILT==='done')return!!CK[t.id];
  if(['fire','soon','upcoming','ongoing'].includes(FILT))return t.urg===FILT&&!CK[t.id];
  return t.sec===FILT;
}

function renderChips(){

    {l:'Resign',d:'2026-04-01'},
    {l:'Visa appt',d:'2026-04-15'},
    {l:'Sem fee',d:'2026-08-01'},
    {l:'Matriculate',d:'2026-08-04'},
    {l:'Semester',d:'2026-09-15'}
  ];
  document.getElementById('chips').innerHTML=pts.map(p=>{
    const n=daysTo(p.d);
    const lab=n<0?`${Math.abs(n)}d late`:n===0?'TODAY':`${n}d`;
    const cls=n<=0?'chip red':n<=14?'chip orange':n<=60?'chip dark':'chip light';
    return`<div class="${cls}"><span style="opacity:.65;margin-right:4px">${p.l}</span>${lab}</div>`;
  }).join('');
}

function renderFire(){
  const ft=TASKS.filter(t=>t.urg==='fire'&&!CK[t.id]);
  const el=document.getElementById('fzone');
  if(ft.length===0||(FILT!=='all'&&FILT!=='fire')){el.innerHTML='';return;}
  el.innerHTML=`<div class="fire-zone">
    <div class="fz-title">Do now — ${ft.length} urgent</div>
    ${ft.slice(0,6).map(t=>`
      <div class="fi" onclick="toggleTask('${t.id}',event)">
        <div class="fi-chk ${CK[t.id]?'on':''}">${CK[t.id]?ck():''}</div>

          <div class="fi-t ${CK[t.id]?'dn':''}">${t.title}</div>
          <div class="fi-s">${t.dl}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

function renderSecs(){
  let html='';
  SORDER.forEach(sid=>{
    const m=SMETA[sid];
    const st=TASKS.filter(t=>t.sec===sid&&match(t));
    if(!st.length)return;
    const dn=st.filter(t=>CK[t.id]).length;
    const open=ESEC[sid]!==false;
    const cards=open?st.map(t=>{
      const d=!!CK[t.id];
      const urg=d?'none':t.urg;
      const chkCls=d?`c${t.urg||'none'}`:t.urg||'';
      const dlCls=d?'neutral':t.urg||'neutral';
      return`<div class="tcard ${d?'done':t.urg||''}">
        <div class="tmain" onclick="toggleTask('${t.id}',event)">
          <div class="tchk ${chkCls}">${d?ck():''}</div>
          <div class="tbody">
            <div class="ttitle ${d?'dn':''}">${t.title}</div>
            <div class="tmeta">
              <span class="tdl ${dlCls}">${t.dl}</span>
              ${t.detail?`<button class="morebtnn" id="tb${t.id}" onclick="toggleExp('${t.id}',event)">${EXP[t.id]?'less':'more'}</button>`:''}
            </div>
          </div>
        </div>
        ${t.detail?`<div class="tdetail ${EXP[t.id]?'open':''}" id="td${t.id}">${t.detail}</div>`:''}
      </div>`;
    }).join(''):'';
    html+=`<div class="sec">
      <div class="sec-hdr" onclick="toggleSec('${sid}')">
        <div class="sec-l">
          <div class="sec-dot" style="background:${m.color}"></div>
          <span class="sec-name">${m.label}</span>
          <span class="sec-ct">${dn?dn+'/'+st.length+' done':st.length}</span>
        </div>
        <span class="sec-tog">${open?'−':'+'}</span>
      </div>
      ${cards}
    </div>`;
  });
  document.getElementById('secs').innerHTML=html;
}

  const t=document.getElementById('toast');

  const d=daysTo('2026-09-15');

    });
  } else {
    document.getElementById('notifBtn').textContent = 'Blocked';
    document.getElementById('notifBtn').className = 'notif-btn denied';
    showToast('Blocked in settings. Go to Settings > Safari > Notifications to enable.');
  }
}

function scheduleLocalNotif() {
  // Show notification daily via checking last shown time
  const last = parseInt(localStorage.getItem('bzlastnotif') || '0');
  const now = Date.now();
  const dayMs = 24 * 60 * 60 * 1000;
  if (now - last > dayMs) {
    localStorage.setItem('bzlastnotif', String(now));
    const m = NOTIF_MESSAGES[Math.floor(Math.random() * NOTIF_MESSAGES.length)];
    // Show after 3 seconds on page open if permission granted
    setTimeout(() => {
      if (Notification.permission === 'granted') {
        new Notification(m.title, { body: m.body, icon: '/icon.png', tag: 'bzazel-daily' });
      }
    }, 3000);
  }
}

function initNotifs() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    document.getElementById('notifBar').style.display = 'none';
    scheduleLocalNotif();
  } else if (Notification.permission === 'default') {
    const shown = localStorage.getItem('bznotif');
    if (!shown) document.getElementById('notifBar').style.display = 'flex';
  }
}

registerSW();
initNotifs();

window.addEventListener('DOMContentLoaded', function() {
  load();
  try {
    renderBigCountdown();
    render();
  } catch(e) {
    console.error('Bzazel render error:', e);
    document.getElementById('secs').innerHTML = '<div style="padding:20px;color:#c0392b;font-size:13px">Error loading tasks: ' + e.message + '</div>';
  }
  try {
    const lm = localStorage.getItem('bzlm');
    if (lm) lastMilestone = parseInt(lm) || 0;
  } catch(e) {}
  loadMessages();
});
</script>
